# qwen-mtp server configuration (DFlash speculative decoding)

# Network — same port as qwen so only one runs at a time (per user RAM constraint).
QWEN_HOST=127.0.0.1
QWEN_PORT=8000

# Model — must be a Qwen3.5/3.6 variant that preserves MTP weights.
# OptiQ-4bit chosen as primary 2026-05-02: identical 6/6 quality to oq6 on
# hard eval, and consistently fast on real reasoning workloads (in contrast
# to std-4bit which had spec-acceptance collapses on hard math problems).
QWEN_MODEL_PATH=./models/Qwen3.6-35B-A3B-OptiQ-4bit
QWEN_MODEL_NAME=./models/Qwen3.6-35B-A3B-OptiQ-4bit
QWEN_DRAFT_MODEL_PATH=./models/Qwen3.6-35B-A3B-DFlash

# Agent knobs (read by scripts/agent.py — runtime-agnostic).
# Defaults tuned for safety against the inference server's hardcoded 5-min
# internal asyncio timeout under memory pressure: smaller per-tool result
# truncation and earlier compaction keep prompts in the size range that
# processes reliably. The OptiQ-4bit model has more headroom than oq6 but
# the same defaults still help on long sessions.
QWEN_AGENT_MAX_STEPS=1000
# Bumped 4000 → 60000 to fit condensed long-form documents (e.g. SEC 10-K,
# arXiv paper, large CSV). With the prior 4000 cap, a 240k 10-K — even
# after condense_tool_result reduced it to ~30k — was chopped to 4k
# (cover page only), so the model never saw the data tables. 60k chars =
# ~15k tokens, well under the 60k-token compact threshold below.
QWEN_AGENT_TOOL_TRUNC=60000
QWEN_AGENT_COMPACT_AT=60000

# Agent guardrails and web-budget defaults. These are read by scripts/agent.py
# and scripts/agent_tools.py; keeping them here makes the operational policy
# visible instead of hiding it in module-level fallbacks.
QWEN_AGENT_STREAM=1
QWEN_AGENT_FIRST_BYTE_TIMEOUT=60
QWEN_AGENT_IDLE_TIMEOUT=90
QWEN_AUDIT_GATE=1
QWEN_REFUSED_BACKSTOP=2
QWEN_LOOP_GUARD_HARD_LIMIT=3
QWEN_WEB_SEARCH_GUARD=1
QWEN_WEB_SEARCH_MAX=100
QWEN_WEB_FETCH_GUARD=1
QWEN_WEB_FETCH_MAX_CALLS=100
# Iter 39: 300k → 3M. The old cap forced `_smart_truncate` to keep head+tail
# and discard the middle, exactly where SEC 10-K financial-statement notes
# live (validated on the Snap convertible-notes prompt). With BM25 + ONNX
# cross-encoder reranker now picking chunks from the full body, we feed the
# whole stripped document into the chunker. Prompt size to the model is
# unchanged — condense_tool_result still caps at TOOL_RESULT_MAX (~60k) —
# so the 5-min decode-timeout concern that motivated the old 300k cap
# doesn't apply.
QWEN_WEB_FETCH_MAX_CHARS=3000000
# Iter 43: retrieval profile is now selected per-tool-call by the model
# (web_fetch(..., mode="numerical"|"semantic")). The mode picks top_k,
# continuity, whether the cross-encoder rerank runs, and whether
# sentence-extract fires. Defaults live in `_MODE_PROFILES` in
# agent_tools.py:
#   - numerical: top_k=10, continuity=2, rerank OFF, sentence-extract OFF.
#     For answers stated verbatim (values, counts, names, dates, list items).
#     Lexical + structural ranking. Tables survive intact.
#   - semantic:  top_k=10, continuity=2, rerank ON,  sentence-extract ON.
#     For answers synthesized from prose. BM25 picks candidates, the ONNX
#     cross-encoder (Xenova/ms-marco-MiniLM-L-6-v2, 22 MB int8, lazy-
#     downloaded on first use) re-ranks them, sentence-extract tightens
#     prose chunks. Default mode if the model doesn't specify.
# The QWEN_CONDENSE_* env vars still work as A/B overrides per-process,
# but are deliberately NOT set here so the model's choice wins by default.
QWEN_SEARCH_DUP_THRESHOLD=0.97
QWEN_SEARCH_JACCARD_THRESHOLD=0.7
# Iter 37 (loosen-for-finance): bumped 4 → 8 after observing legitimate
# multi-period queries trip near-dup detection — "Apple Q1 2024 revenue"
# vs "Apple Q2 2024 revenue" reads as ~0.85 jaccard overlap even though
# the semantic intent (different period) is clearly distinct. Cap=8
# still bounds the worst-case "rephrasing forever" spam at ~10 attempts
# but lets a 4-quarter sweep through.
QWEN_WEB_SEARCH_NEAR_DUP_MAX=8
# Iter 37 (loosen-for-finance): bumped 3 → 5. Re-fetching a 240k SEC 10-K
# with different `max_chars` to access different sections (MD&A, then
# Financial Statements, then Notes) is a legit research pattern, not a
# bypass attempt. find_in_url + web_outline are still pointed at in the
# refusal message for the truly-stuck case.
QWEN_URL_FETCH_MAX=5
QWEN_URL_GUARD_ENABLE=1

# Streaming text loop detector (read by scripts/loop_guard.py and reported by
# qwen-proxy health). These are separate from the agent-level hard limit above:
# the proxy catches single-response generation loops, while the agent hard
# limit catches repeated loop-guard aborts across turns.
LOOP_GUARD_DISABLE=0
LOOP_GUARD_SUFFIX_MIN_LEN=24
LOOP_GUARD_SUFFIX_REPEATS=4
LOOP_GUARD_NGRAM_WINDOW=600
LOOP_GUARD_NGRAM_N=6
LOOP_GUARD_NGRAM_FLOOR=0.45
LOOP_GUARD_MIN_TEXT=200
LOOP_GUARD_PHRASE_WINDOW=4000
LOOP_GUARD_PHRASE_MIN_LEN=25
LOOP_GUARD_PHRASE_MAX_LEN=200
LOOP_GUARD_PHRASE_REPEATS=4

# DFlash speedups (applied 2026-05-03):
#  KV cache 8-bit quantization on the target model. Halves KV memory at
#  long contexts. Measured: +9% TPS on short prompts, +24% on 5K, +33% on
#  9K — bigger win the bigger the prompt. Quality: nearly indistinguishable
#  from fp16 KV on multi-turn agent workflows (validated separately).
DFLASH_QUANTIZE_KV=1
#  Larger prefill chunk (default 512). Helps the baseline path (long-prompt
#  fallback) by reducing per-chunk overhead. Marginal but free.
DFLASH_PREFILL_CHUNK=2048
#  Quantize the DFlash draft model (in-memory). Reclaims ~1 GB and gives a
#  small extra TPS boost on short prompts.
DFLASH_QUANTIZE_DRAFT=1
#  Pack target model MoE/MLP weights at load time for faster Metal kernels.
#  Small but consistent win across all prompt sizes. DO NOT also set
#  DFLASH_PACK_ATTN=1 — it crashes on OptiQ-4bit quantized attention weights.
DFLASH_PACK_MLP=1
#  Verify length cap: how many drafted tokens to verify per spec cycle.
#  Default 16 (= block_tokens). 8 trades fewer accepted-per-cycle for cheaper
#  cycles. Net win: +13% on short, +4-7% on long. 4 is too aggressive (regresses).
DFLASH_VERIFY_LEN=8
#  Lower the threshold for cross-request KV cache reuse (default 256 tokens).
#  64 lets cache reuse activate on shorter agent prompts where the model
#  hasn't yet accumulated much context. Marginal but free.
DFLASH_PROMPT_CACHE_MIN=32
#  Number of distinct prompt prefixes to retain in the cache (vLLM-APC
#  equivalent). Patched 2026-05-04: replaced the old single-slot cache with
#  mlx_lm.LRUPromptCache (trie + LRU + deepcopy on fetch). With one slot any
#  diverging prompt cleared the cache, which thrashed when alternating
#  between distinct sessions (agent vs. chat, two agents, benchmark vs.
#  interactive). 4 slots covers common patterns. KV cache for Qwen3.6's GQA
#  (2 KV heads × 256 head_dim × 10 full-attn layers) is tiny — ~10 MB per
#  4K-context entry — so 4 slots cost <100 MB.
#  Bumped 2026-05-05 from 4 → 32: every graph has 2-4 distinct system
#  prompts (one per node), and we have 8+ graphs registered. With only
#  4 slots, switching between graphs in a session evicts cached prefixes
#  on every run. Inspecting all current graphs surfaced 25 unique node
#  system prompts averaging 294 tokens each. 32 slots covers the full
#  catalog plus the chat tab's prompt and headroom; per-slot cost is
#  ~10 MB at 4K-context, so worst-case ~320 MB even at full saturation
#  (vs the M4 Pro's 48 GB unified memory).
#  Bumped 2026-05-06 from 32 → 48 after the chat tool re-eval added back
#  several specialized tools (test_run, web_outline, github_repo, arxiv,
#  DOI, graph run/list, inspect_data) — per-turn baseline grew, slot
#  turnover was getting close to the 32 ceiling on multi-graph sessions.
#  Per-slot cost still ~10 MB at 4K-context, so 48 slots = ~480 MB worst
#  case (vs 48 GB unified memory).
DFLASH_PROMPT_CACHE_SLOTS=48
#  Byte cap on total APC trie size (sums snapshot sizes across all slots).
#  At 80k context one snapshot is ~2.4 GB (target KV 8-bit + draft KV bf16
#  + ~15% deepcopy/state overhead); without a byte cap a 10-turn chat that
#  grows to 80k can leave ~10-12 GB of progressively-sized snapshots in
#  the trie, since LRU only evicts on slot count (48 here, deliberately
#  high for graph caching). 4 GB ceiling lets all 25 graph-node snapshots
#  (small) stay cached while big chat snapshots rotate. Set 0 to disable.
DFLASH_PROMPT_CACHE_GB=4
#  MLX memory limits (read by patched serve.py at startup):
#    DFLASH_WIRED_GB: GB to keep wired/non-pageable (default 32 of 48 GB)
#    DFLASH_CACHE_GB: MLX buffer-cache limit (default unlimited; setting to
#                     8 GB stops MLX from hoarding ~45 GB and reduces swap)
# wired_limit requires sudo on macOS Sonoma+ which can't be granted from a
# headless daemon — set to 0 to skip the call. We've verified empirically
# that with this off, RSS stays at ~20GB (well below physical 48GB).
DFLASH_WIRED_GB=0
DFLASH_CACHE_GB=8
#  Skip the redundant mx.async_eval+mx.eval after the draft model's
#  forward pass — greedy_tokens_with_mask triggers eval lazily, so the
#  explicit barrier was draining the GPU pipeline before verify could
#  start. Measured +8% HE / +3% GSM / +2% MBPP / -2% wall on the harder
#  bench (HE[130:140], GSM[500:515], MBPP[200:210], MATH-500[0:10],
#  GSM-Hard[0:10]) vs legacy with same quality (44/55) and identical
#  sha1 on deterministic prompts.
DFLASH_LAZY_DRAFT_EVAL=1
#  Runtime repetition penalty hook. Default stays off because it can change
#  deterministic greedy outputs; test candidate values with
#  `DFLASH_REP_PENALTY=0.05 python scripts/bench_rep_penalty.py --label rep05`
#  before promoting. The hook is wired into baseline + DFlash stream/sync
#  generation and reports `repetition_penalty=true` in runtime summaries.
DFLASH_REP_PENALTY=0.075
DFLASH_REP_HISTORY=128
#  Adaptive block_tokens thresholds. Defaults are 0.35 / 2 (shrink when
#  rolling acceptance < 35% of current block_len, by step 2). Gentler
#  thresholds (0.25 / 1) shrink less aggressively + step finer, which
#  keeps the model on bigger blocks longer when acceptance dips.
#  Measured: +1 HumanEval problem (9/10 vs 8/10), -1.7% wall, -1 to -4%
#  per-token TPS on the harder bench. The quality win was reproducible
#  across two runs at this setting; the per-token TPS dip is small and is
#  more than paid back by solving the extra problem in fewer total
#  tokens. Set DFLASH_ADAPTIVE_DOWN=0.35 DFLASH_ADAPTIVE_STEP=2 to revert.
DFLASH_ADAPTIVE_DOWN=0.25
DFLASH_ADAPTIVE_STEP=1
#  Mixed-precision KV cache (KVTuner-inspired): layers BELOW this index
#  keep DFLASH_KV_BITS=8, layers AT OR ABOVE drop to 4-bit. Halves the
#  KV memory of the back half of the model (where quality is least
#  sensitive per the literature). 20/40 = 50% of layers go to 4-bit.
#  Set to 999 to disable and revert to uniform 8-bit KV.
DFLASH_KV_4BIT_FROM_LAYER=20
#  Custom hand-tuned Metal kernel for greedy_tokens_with_mask. The audit
#  originally found this regressed -7% TPS at 9K due to per-call mx.array
#  allocation. 2026-05-08 fix (cached vocab_size scalar + cached int32
#  cast of the suppress mask via id()-keyed memoization) eliminates that
#  overhead. Re-bench shows: short +7-9%, p_3k +0-7%, p_5k +10%, p_9k
#  ~unchanged. Quality 5/5 preserved. Tool-call success 100% preserved.
#  Set to 0 to revert to mx.compile-fused argmax path.
DFLASH_USE_CUSTOM_GREEDY=1
